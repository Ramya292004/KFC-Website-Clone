<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <title>KFC Popup</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      font-family: 'Poppins', sans-serif;
      background:#f2f2f2;
    }
    .overlay{
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .popup{
      width:55%;
      background:white;
      border-radius:4px;
      overflow:hidden;
    }
    .popup-top{
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      padding:25px;
      border-bottom:1px solid #ddd;
    }
    .popup-top h1{
      font-size:25px;
      font-weight:bold;
      color:#1d1d1d;
      text-transform:uppercase;
    }
    .close{
      position:absolute;
      right:30px;
      top:10px;
      font-size:35px;
      cursor:pointer;
    }
    .popup-content{
      text-align:center;
      padding:40px 20px 60px;
      background-color: rgb(249, 248, 247);
    }
    .popup-content h2{
      font-size:30px;
      line-height:1.2;
      font-weight:600;
      text-transform:uppercase;
      color:#1d1d1d;

      margin-bottom:50px;
    }
    .order-btn{
      width:50%;
      padding:10px;
      border:2px solid #555;
      border-radius:40px;
      background:white;
      font-size:15px;
      margin-bottom:35px;
      cursor:pointer;
      transition:0.3s;
    }
    .order-btn:hover{
      background:rgb(233, 229, 229);
      color:black;
    }

    /* ── TABLET (481px – 1024px) ── */
      @media (max-width: 1024px) {

           .popup {
            width: 75%;
           }
           .popup-top h1 {
            font-size: 20px;
           }
           .popup-content h2 {
           font-size: 24px;
           margin-bottom: 36px;
           }
           .order-btn {
            width: 65%;
            font-size: 14px;
            margin-bottom: 28px;
           }
        }


    /* ── MOBILE (≤ 480px) ── */
       @media (max-width: 480px) {

           .overlay {
            align-items: center;
            padding: 16px;
            }
           .popup {
            width: 100%;        
            border-radius: 8px;
            }
           .popup-top {
            padding: 16px;
            }
           .popup-top h1 {
            font-size: 16px;
            text-align: center;
            padding-right: 30px; 
            }
           .close {
            right: 16px;
            top: 8px;
            font-size: 28px;
            }
            .popup-content {
             padding: 28px 16px 40px;
            }
            .popup-content h2 {
            font-size: 18px;
            margin-bottom: 28px;
            line-height: 1.4;
            }
            .order-btn {
            width: 85%;         
            padding: 12px;
            font-size: 14px;
            margin-bottom: 18px;
            }
        }

  </style>

</head>
<body>
  <div class="overlay">
    <div class="popup">
      <div class="popup-top">
        <h1>START YOUR ORDER</h1>
        <span class="close">&times;</span>
      </div>
      <div class="popup-content">
        <h2>
          HOW WOULD YOU LIKE TO <br>
          RECEIVE YOUR ORDER?
        </h2>
        <button class="order-btn">Delivery</button><br>
        <button class="order-btn">Pick up</button><br>
        <button class="order-btn">Dine In</button>
      </div>
    </div>
  </div>
</body>
</html>
