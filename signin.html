<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./siginin.css">
    <title>Sign in Page</title>
</head>
<body>
    <div class="container">

  <p class="top-text">Sign In / Sign up</p>

  <img src="./kfc logo.jpg" class="logo" alt="KFC"">

  <h2 class="heading">
    LET’S SIGN IN OR CREATE ACCOUNT WITH YOUR PHONE NUMBER!
  </h2>

  <div class="input-box">
    <input type="text" required>
    <label>Phone Number*</label>
  </div>

  <p class="terms">
    By “logging in to KFC”, you agree to our 
    <span>Privacy Policy</span> and <span>Terms & Conditions</span>.
  </p>

  <button class="btn-primary">Send Me a Code</button>

  <div class="divider">
    <span></span>
    <p>or</p>
    <span></span>
  </div>

  <button class="btn-secondary">Skip, Continue As Guest</button>

</div>

</body>
</html>
